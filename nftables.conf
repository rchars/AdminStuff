#!/usr/sbin/nft -f
flush ruleset

#
# Most izolacyjny dla niezaufanych workloadów (VM KVM + kontenery systemd-nspawn)
#
# Założenia:
# - Wszystkie endpointy podpięte do mostu izolacyjnego mają mieć dostęp do Internetu po IPv4 przez NAT.
# - Endpointy mają mieć dostęp do DNS na hoście (unbound zbindowany na adresie/IF mostu).
# - Endpointy nie mogą komunikować się między sobą (brak east-west) ani na L3, ani na L2.
# - Endpointy nie mogą „mieszać” w hoście: host przyjmuje od nich tylko rzeczy jawnie dozwolone (tu: DNS i opcjonalnie ping do bramy).
#
# Jak to jest zrobione:
# - inet/filter:
#   * input: policy drop; wpuszcza established/related, loopback oraz DNS z mostu.
#     Opcjonalnie wpuszcza ICMP echo-request tylko do adresu bramy na tym segmencie.
#   * forward: policy drop; wpuszcza established/related; ucina IPv6 z mostu;
#     ucina forwarding bridge->bridge; wpuszcza ruch z mostu „na zewnątrz” (zgodnie z routingiem hosta).
# - ip/nat:
#   * postrouting: masquerade tylko dla podsieci mostu izolacyjnego; interfejs wyjściowy wybiera routing.
# - bridge/filter (L2):
#   * ARP: pozwala tylko na rozwiązywanie MAC dla bramy (adres IP hosta na tym moście),
#     resztę ARP ucina, żeby endpointy nie uczyły się MAC innych endpointów.
#   * broadcast/multicast: ucięte, żeby nie było „wycieków” informacji na L2.
#   * unicast: przepuszczany tylko do MAC hosta na tym moście; reszta drop.
#

define ISOLATION_BR_IFNAME      = "isolationbr"
define ISOLATION_BR_IPV4_NET    = 240.0.0.0/29

# To są parametry „hosta na tym moście”: host jest uczestnikiem tego segmentu L2/L3,
# bo ma na moście adres IP (brama dla endpointów) i odpowiada na ARP.
define ISOLATION_BR_GW_IPV4     = 240.0.0.1
define ISOLATION_BR_GW_MAC      = aa:bb:cc:dd:ee:ff

table inet filter {
  chain input {
    type filter hook input priority filter; policy drop;

    ct state invalid drop
    ct state established,related accept
    iif lo accept

    # Endpoint -> host: DNS do unbound na hoście (na interfejsie mostu izolacyjnego).
    iifname $ISOLATION_BR_IFNAME udp dport 53 accept
    iifname $ISOLATION_BR_IFNAME tcp dport 53 accept

    # (opcjonalnie) Endpoint -> host: pozwól pingować tylko bramę na tym segmencie.
    iifname $ISOLATION_BR_IFNAME ip daddr $ISOLATION_BR_GW_IPV4 icmp type echo-request accept
  }

  chain forward {
    type filter hook forward priority filter; policy drop;

    ct state invalid drop
    ct state established,related accept

    # Endpointy z mostu izolacyjnego nie mają IPv6 w ogóle.
    iifname $ISOLATION_BR_IFNAME meta nfproto ipv6 drop

    # Blokada east-west na L3 (wymaga włączonego br_netfilter).
    iifname $ISOLATION_BR_IFNAME oifname $ISOLATION_BR_IFNAME drop

    # Endpoint -> „na zewnątrz”: host routuje/NATuje zgodnie z własną tablicą routingu.
    iifname $ISOLATION_BR_IFNAME oifname != $ISOLATION_BR_IFNAME accept
  }

  chain output {
    type filter hook output priority filter; policy accept;
  }
}

table ip nat {
  chain postrouting {
    type nat hook postrouting priority srcnat; policy accept;

    # NAT dla podsieci mostu izolacyjnego; egress wybiera routing (default route).
    ip saddr $ISOLATION_BR_IPV4_NET masquerade
  }
}

table bridge filter {
  chain forward {
    type filter hook forward priority filter; policy accept;

    # --- Higiena ARP (martian/spoof) ---
    ether type arp arp saddr ip { 0.0.0.0, 255.255.255.255 } drop
    ether type arp arp saddr ip 224.0.0.0/4 drop
    ether type arp arp daddr ip 224.0.0.0/4 drop

    # --- ARP: pozwól tylko na ARP do/z bramy (host na tym segmencie) ---
    # Endpointy mogą pytać ARP tylko o bramę (GW).
    ether type arp arp operation request arp daddr ip $ISOLATION_BR_GW_IPV4 accept
    # Endpointy mogą przyjmować ARP reply tylko od bramy (GW).
    ether type arp arp operation reply   arp saddr ip $ISOLATION_BR_GW_IPV4 accept
    # Resztę ARP utnij, żeby endpointy nie poznawały MAC innych endpointów.
    ether type arp drop

    # Utnij broadcast/multicast, żeby endpointy nie „podsłuchiwały” L2.
    meta pkttype { broadcast, multicast } drop

    # Unicast: dopuść tylko do MAC bramy/hosta na tym moście (DNS/ping/itd.).
    ether daddr $ISOLATION_BR_GW_MAC accept

    # Cała reszta (w tym endpoint->endpoint unicast) ma nie przejść.
    drop
  }
}
